<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient for the 3D button -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="100%" stop-color="#141415"/>
    </linearGradient>
    
    <!-- Knob Base Gradient -->
    <linearGradient id="knobGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3c3c3e"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
    
    <!-- Knob Shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    
    <!-- Glow for the accent line -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square background to match dark synth chassis -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)"/>
  <rect width="100" height="100" rx="24" fill="none" stroke="#333336" stroke-width="2"/>

  <!-- Main Knob Body with Shadow -->
  <circle cx="50" cy="50" r="32" fill="url(#knobGrad)" filter="url(#dropShadow)" stroke="#111" stroke-width="2"/>

  <!-- Inner Knob Face (indentation) -->
  <circle cx="50" cy="50" r="28" fill="#1e1e20" stroke="#2c2c2e" stroke-width="1"/>

  <!-- Accent Indicator Line (pointing top right) -->
  <line x1="50" y1="50" x2="68" y2="32" stroke="#5ab15a" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Center pivot dot -->
  <circle cx="50" cy="50" r="6" fill="#111"/>
</svg>
